name: MaxMarket CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: maxmarket_user
          POSTGRES_PASSWORD: maxmarket_password
          POSTGRES_DB: maxmarket_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maxmarket_user -d maxmarket_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://maxmarket_user:maxmarket_password@localhost:5432/maxmarket_db
      JWT_ACCESS_SECRET: ci-test-access-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/api/package-lock.json

      - name: Install dependencies
        working-directory: services/api
        run: npm ci

      - name: Generate Prisma client
        working-directory: services/api
        run: npx prisma generate

      - name: Run migrations
        working-directory: services/api
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: services/api
        run: npx prisma db seed

      - name: Build
        working-directory: services/api
        run: npm run build

      - name: Run tests
        working-directory: services/api
        run: npm run test

  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - name: Install dependencies
        working-directory: services/web
        run: npm ci

      - name: Build
        working-directory: services/web
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t maxmarket-api ./services/api

      - name: Build Web image
        run: docker build -t maxmarket-web ./services/web
