  # ─── CATALOG ─────────────────────────────────────────────────────────────────

  /catalog/products:
    get:
      tags: [Catalog]
      summary: List products
      description: |
        **Public (unauthenticated):** Returns `PublicProduct` — price fields entirely omitted
        (CTO_PACKET §2, PRD §2.2, mandatory standard).

        **Authenticated:** Returns `Product` with price fields present.
        Role-based field stripping in service layer:
        - client: sees clientPrice (own group); no costPrice
        - agent/manager/admin/super_admin: sees costPrice and pricePerUnit/pricePerBox
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/LanguageHeader'
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
        - name: search
          in: query
          description: Full-text / trigram search on SKU or product name.
          schema:
            type: string
        - name: category
          in: query
          description: Filter by category UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: |
            Paginated product list.
            Unauthenticated: PublicProduct items.
            Authenticated: Product items (price fields populated per role).
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/PublicProduct'
                        - $ref: '#/components/schemas/Product'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Catalog]
      summary: Create product (with initial variant)
      description: |
        Roles: super_admin, admin.
        A product must be created with at least one variant (PRD §2.1).
        Additional variants can be added via POST /catalog/products/{productId}/variants.
      parameters:
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, variants]
              properties:
                name:
                  $ref: '#/components/schemas/MultilingualString'
                description:
                  $ref: '#/components/schemas/MultilingualString'
                categoryId:
                  type: string
                  format: uuid
                  nullable: true
                variants:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [sku, unitType, minOrderQty, costPrice, pricePerUnit]
                    properties:
                      sku:
                        type: string
                      unitType:
                        type: string
                        enum: [piece, box, kg]
                      minOrderQty:
                        type: integer
                        minimum: 1
                      costPrice:
                        type: number
                        minimum: 0
                        description: Internal cost price. Not visible to clients.
                      pricePerUnit:
                        type: number
                        minimum: 0
                      pricePerBox:
                        type: number
                        minimum: 0
                        nullable: true
      responses:
        '201':
          description: Product created
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '409':
          description: SKU already exists
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /catalog/products/{id}:
    get:
      tags: [Catalog]
      summary: Get product by ID
      description: |
        **Public (unauthenticated):** Returns `PublicProduct` — no price fields.
        **Authenticated:** Returns `Product` with role-appropriate price fields.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/LanguageHeader'
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      responses:
        '200':
          description: Product
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PublicProduct'
                  - $ref: '#/components/schemas/Product'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Catalog]
      summary: Update product metadata
      description: "Roles: super_admin, admin. Updates name, description, categoryId, isActive."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  $ref: '#/components/schemas/MultilingualString'
                description:
                  $ref: '#/components/schemas/MultilingualString'
                categoryId:
                  type: string
                  format: uuid
                  nullable: true
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated product
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Catalog]
      summary: Soft delete product
      description: "Roles: super_admin, admin. Blocked if product has active (non-rejected, non-cancelled) orders."
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      responses:
        '200':
          description: Soft deleted
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Product has active orders
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── VARIANT CRUD (H1 fix) ───────────────────────────────────────────────────

  /catalog/products/{productId}/variants:
    post:
      tags: [Catalog]
      summary: Add variant to existing product
      description: "Roles: super_admin, admin"
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sku, unitType, minOrderQty, costPrice, pricePerUnit]
              properties:
                sku:
                  type: string
                unitType:
                  type: string
                  enum: [piece, box, kg]
                minOrderQty:
                  type: integer
                  minimum: 1
                costPrice:
                  type: number
                  minimum: 0
                pricePerUnit:
                  type: number
                  minimum: 0
                pricePerBox:
                  type: number
                  minimum: 0
                  nullable: true
      responses:
        '201':
          description: Variant created
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        '409':
          description: SKU already exists
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /catalog/products/{productId}/variants/{variantId}:
    put:
      tags: [Catalog]
      summary: Update variant
      description: |
        Roles: super_admin, admin.
        Allows updating pricing fields (costPrice, pricePerUnit, pricePerBox),
        minOrderQty, unitType, isActive.
        SKU change is blocked if any non-Draft, non-Rejected, non-Cancelled orders
        reference this variant (order history integrity). Returns 409 if blocked.
        Base price (pricePerUnit/pricePerBox) changes take effect on new orders and
        on Draft order submissions; Approved/Fulfilled orders are not affected.
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sku:
                  type: string
                  description: |
                    SKU update is blocked if any non-Draft, non-Rejected, non-Cancelled orders
                    reference this variant (to preserve order history integrity).
                    Returns 409 CONFLICT if blocked. See Decision Needed DA-05 in API info block.
                unitType:
                  type: string
                  enum: [piece, box, kg]
                minOrderQty:
                  type: integer
                  minimum: 1
                costPrice:
                  type: number
                  minimum: 0
                pricePerUnit:
                  type: number
                  minimum: 0
                pricePerBox:
                  type: number
                  minimum: 0
                  nullable: true
                isActive:
                  type: boolean
      responses:
        '200':
          description: Updated variant
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariant'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: SKU conflict or blocked by active orders
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Catalog]
      summary: Soft delete variant
      description: "Roles: super_admin, admin. Blocked if variant has active (non-rejected, non-cancelled) orders."
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: variantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      responses:
        '200':
          description: Soft deleted
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Variant has active orders
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

