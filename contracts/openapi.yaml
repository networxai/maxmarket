openapi: "3.0.3"
info:
  title: MaxMarket API
  version: "1.0.2"
  description: |
    MaxMarket B2B wholesale platform API.
    Base URL: /api/v1

    **Correlation ID:** Every request MAY include an `X-Correlation-ID` header (UUID).
    If provided, the server echoes it in the response. If absent, the server generates one.
    Every response carries `X-Correlation-ID` in the response header.
    Every error response includes `correlationId` in the body.

    **Error envelope:** All error responses use the `ErrorResponse` schema.

    **Public catalog:** `GET /catalog/products` and `GET /catalog/products/{id}` require no
    authentication and return `PublicProduct` — price fields are entirely omitted.
    Authenticated requests to those same endpoints return `Product` with role-appropriate
    price fields resolved server-side.

    **Optimistic locking:** `POST /orders/{id}/approve` AND `PUT /orders/{id}` (when editing
    an Approved order) both require the current `versionLock` value to prevent concurrent
    conflicting writes.

    **Draft order pricing:** At Draft creation, `groupDiscount = 0` and `finalPrice = basePrice`
    (captured from current `pricePerUnit`). Both values are recalculated on submission from
    the then-current client group discount rule (DN-PRICE-02).

    **Decision Needed (open):**
    - DA-05: Can an Admin change a variant's SKU if non-Draft orders reference it?
      Recommendation: block if any non-Draft/non-Rejected/non-Cancelled orders exist.
    - DA-06: Does image management require binary multipart upload or URL-only reference?
      Current spec assumes URL-only (CDN pre-upload pattern).

    **Changelog v1.0.2 (Opus Final Gate):**
    - FIX-O1: Added SalesReportRow / SalesByManagerRow schemas; response schemas on all 4 report GET endpoints
    - FIX-O6/O7: Added 403 responses to approve, reject, fulfill, cancel, return, versions list/detail
    - FIX-O8: Added 403 to GET /users/{agentId}/clients
    - FIX-O10: Order.agentId nullable + client-stripping note
    - FIX-O11: Draft pricing behaviour documented on POST /orders and OrderLineItem fields
    - FIX-O12/O13: Removed phantom DA-05/DA-06 references; added inline business rules + Decision Needed section

    **Changelog v1.0.1 (Opus consistency pass):**
    - C1: PublicProduct/PublicProductVariant schemas; public catalog endpoints use them
    - C2: versionLock added to PUT /orders/{id} request body
    - C3: X-Correlation-ID declared as response header component on all responses
    - H1: Variant CRUD + image management endpoints added
    - H2: Category PUT/DELETE endpoints added
    - H3: InsufficientStockDetail schema; approve 422 typed
    - H4: Role descriptions + agent scoping added to all report endpoints
    - M4: ErrorResponse referenced on all error responses; version snapshot/list schemas added
    - M5: STOCK_BELOW_RESERVED error code documented on stock adjust 422
    - L1: client-groups list now paginated
    - L2: CorrelationIdRequestHeader parameter component added

servers:
  - url: /api/v1
    description: API v1

components:
  # ─── SECURITY ───────────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ─── HEADERS ────────────────────────────────────────────────────────────────
  headers:
    X-Correlation-ID:
      description: |
        UUID for request tracing. Echoed from request X-Correlation-ID header if provided,
        otherwise server-generated. Present on every response.
      schema:
        type: string
        format: uuid

  # ─── PARAMETERS ─────────────────────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: pageSize
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    LanguageHeader:
      name: Accept-Language
      in: header
      schema:
        type: string
        enum: [en, hy, ru]
        default: en
    CorrelationIdRequestHeader:
      name: X-Correlation-ID
      in: header
      required: false
      description: Optional client-provided correlation UUID. Server echoes it in the response header.
      schema:
        type: string
        format: uuid

  # ─── SCHEMAS ────────────────────────────────────────────────────────────────
  schemas:

    # --- Error ---
    ErrorResponse:
      type: object
      required: [errorCode, message, correlationId]
      properties:
        errorCode:
          type: string
          description: |
            Machine-readable error code. Known values include:
            INSUFFICIENT_STOCK, ORDER_NOT_EDITABLE, OPTIMISTIC_LOCK_CONFLICT,
            STOCK_BELOW_RESERVED, VALIDATION_ERROR, TOKEN_EXPIRED, TOKEN_MISSING,
            FORBIDDEN, NOT_FOUND, CONFLICT, RATE_LIMITED
          example: INSUFFICIENT_STOCK
        message:
          type: string
          description: Human-readable error message.
        details:
          nullable: true
          description: |
            Structured error detail. Schema depends on errorCode:
            - INSUFFICIENT_STOCK: array of InsufficientStockDetail
            - VALIDATION_ERROR: array of Zod validation errors
            - All others: null or plain string
        correlationId:
          type: string
          format: uuid

    InsufficientStockDetail:
      type: object
      description: |
        Per-line-item stock shortage detail. Returned in ErrorResponse.details array
        when errorCode = INSUFFICIENT_STOCK (PRD FS-ORD-01).
      required: [lineItemId, variantId, sku, requestedQty, availableQty, reservedQty]
      properties:
        lineItemId:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        sku:
          type: string
        requestedQty:
          type: integer
        availableQty:
          type: integer
        reservedQty:
          type: integer

    # --- Pagination ---
    PaginationMeta:
      type: object
      required: [page, pageSize, totalCount, totalPages]
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalCount:
          type: integer
        totalPages:
          type: integer

    # --- Common ---
    MultilingualString:
      type: object
      description: |
        Multilingual text field. English is required; hy and ru are optional.
        If hy or ru are absent, the API returns the en value as fallback (DN-LANG-01).
      required: [en]
      properties:
        en:
          type: string
        hy:
          type: string
          nullable: true
        ru:
          type: string
          nullable: true

    Role:
      type: string
      enum: [super_admin, admin, manager, agent, client]

    # --- Users ---
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        preferredLanguage:
          type: string
          enum: [en, hy, ru]
        isActive:
          type: boolean
        clientGroupId:
          type: string
          format: uuid
          nullable: true
          description: Populated only for role = client.
        createdAt:
          type: string
          format: date-time

    # --- Client Groups ---
    ClientGroup:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        discountType:
          type: string
          enum: [fixed, percentage]
        discountValue:
          type: number
          format: double

    # --- Catalog (Public — NO price fields) ---
    PublicProductVariant:
      type: object
      description: |
        Variant shape returned for unauthenticated (public) requests.
        All price fields are OMITTED to comply with CTO_PACKET §2 and PRD §2.2.
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        unitType:
          type: string
          enum: [piece, box, kg]
        minOrderQty:
          type: integer
        images:
          type: array
          description: Image objects with id (for delete/reorder), url, sortOrder.
          items:
            type: object
            required: [id, url, sortOrder]
            properties:
              id:
                type: string
                format: uuid
              url:
                type: string
                format: uri
              sortOrder:
                type: integer
        isActive:
          type: boolean

    PublicProduct:
      type: object
      description: |
        Product shape returned for unauthenticated (public) requests.
        Uses PublicProductVariant — no cost or client pricing exposed.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Resolved to Accept-Language with en fallback.
        description:
          type: string
        category:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/PublicProductVariant'
        isActive:
          type: boolean

    # --- Catalog (Authenticated — includes price fields) ---
    ProductVariant:
      type: object
      description: |
        Variant shape returned for authenticated requests.
        costPrice: visible to agent, manager, admin, super_admin only — stripped for client.
        clientPrice: base_price - group_discount; null for roles with no group (agent/manager see all group prices).
        pricePerUnit / pricePerBox: base prices; visible to all authenticated roles.
      properties:
        id:
          type: string
          format: uuid
        sku:
          type: string
        unitType:
          type: string
          enum: [piece, box, kg]
        minOrderQty:
          type: integer
        costPrice:
          type: number
          format: double
          nullable: true
          description: Visible to agent, manager, admin, super_admin. Stripped (null) for client.
        pricePerUnit:
          type: number
          format: double
        pricePerBox:
          type: number
          format: double
          nullable: true
        clientPrice:
          type: number
          format: double
          nullable: true
          description: |
            Computed as base_price - group_discount for the requesting client's group.
            Null for agents/managers viewing catalog (they use pricePerUnit directly).
        images:
          type: array
          description: Image objects with id (for delete/reorder), url, sortOrder.
          items:
            type: object
            required: [id, url, sortOrder]
            properties:
              id:
                type: string
                format: uuid
              url:
                type: string
                format: uri
              sortOrder:
                type: integer
        isActive:
          type: boolean

    Product:
      type: object
      description: Authenticated product view. Uses ProductVariant with role-based field stripping.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Resolved to Accept-Language with en fallback.
        description:
          type: string
        category:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariant'
        isActive:
          type: boolean

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: Resolved to Accept-Language with en fallback.

    # --- Inventory ---
    WarehouseStock:
      type: object
      properties:
        variantId:
          type: string
          format: uuid
        sku:
          type: string
        productName:
          type: string
          nullable: true
          description: Display name of the product
        warehouseId:
          type: string
          format: uuid
        availableQty:
          type: integer
        reservedQty:
          type: integer

    # --- Orders ---
    OrderLineItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        variantId:
          type: string
          format: uuid
        sku:
          type: string
        productName:
          type: string
          nullable: true
          description: Display name of the product
        warehouseId:
          type: string
          format: uuid
        qty:
          type: integer
        unitType:
          type: string
        basePrice:
          type: number
          format: double
          description: Captured from product_variants.price_per_unit at order creation.
        groupDiscount:
          type: number
          format: double
          description: |
            Captured from `client_groups.discount_value` at **submission** time (not at Draft creation).
            At Draft stage this value is `0`.
            Raw value is stripped (null) for client role — clients see only `finalPrice` (PRD §3.2).
            Recalculated on every submission from the then-current group discount rule (DN-PRICE-02).
        finalPrice:
          type: number
          format: double
          description: |
            `manager_override` if set, else `(base_price - group_discount)`. Recomputed on submission.
            At Draft stage: `finalPrice = basePrice` (groupDiscount not yet applied).
            Only this field is visible in the UI for all roles; managerOverride is audit-only (PRD §3.2).

    OrderStatus:
      type: string
      enum: [draft, submitted, approved, fulfilled, rejected, cancelled, returned]

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
          description: Human-readable, server-generated (e.g. MM-2024-001001).
        clientId:
          type: string
          format: uuid
        clientName:
          type: string
          nullable: true
          description: Display name of the client
        agentId:
          type: string
          format: uuid
          nullable: true
          description: |
            UUID of the agent who created the order.
            Stripped (null) for client role responses — clients do not see agent assignment data
            (PRD §1.5; 09_RBAC_SECURITY.md §5.6).
        agentName:
          type: string
          nullable: true
          description: Display name of the agent. Stripped for client role.
        status:
          $ref: '#/components/schemas/OrderStatus'
        currentVersion:
          type: integer
          description: Sequential version number. Incremented on each Admin version edit.
        versionLock:
          type: integer
          description: |
            Optimistic concurrency counter. Incremented on approve and on Admin version edit.
            Must be echoed in POST /orders/{id}/approve and PUT /orders/{id} (when Approved)
            to prevent dual-approval and concurrent version creation (EC-ORD-05).
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/OrderLineItem'
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderVersionSummary:
      type: object
      description: Summary row in order version list.
      properties:
        versionNumber:
          type: integer
        createdByUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        diffSummary:
          type: string
          description: Human-readable one-line summary of what changed.

    OrderVersionDetail:
      type: object
      description: Full version snapshot with field-level diff.
      properties:
        versionNumber:
          type: integer
        snapshot:
          $ref: '#/components/schemas/Order'
        diff:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              oldValue: {}
              newValue: {}
        createdByUserId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    # --- Reports ---
    SalesReportRow:
      type: object
      description: |
        Single aggregated row in sales-by-date, sales-by-client, or sales-by-product reports.
        Represents totals for the grouping dimension within the requested date range.
      properties:
        dimension:
          type: string
          description: |
            The grouping value (date string for sales-by-date; clientId for sales-by-client;
            variantId/sku for sales-by-product).
        dimensionLabel:
          type: string
          description: Human-readable label for the dimension (e.g. date string, client name, SKU).
        orderCount:
          type: integer
          description: Number of Fulfilled orders in the dimension.
        totalQty:
          type: integer
          description: Total units fulfilled.
        totalRevenue:
          type: number
          format: double
          description: Sum of (finalPrice × qty) for all Fulfilled line items in the dimension.
        currencyNote:
          type: string
          description: Currency is always the system default (v1 single currency).
          nullable: true

    SalesByManagerRow:
      type: object
      description: Single row in the sales-by-manager report.
      properties:
        managerId:
          type: string
          format: uuid
        managerName:
          type: string
        orderCount:
          type: integer
        totalRevenue:
          type: number
          format: double

    # --- Audit ---
    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        eventType:
          type: string
          description: Dot-namespaced event type string (see events.json and DB_SCHEMA §6).
        actorId:
          type: string
          format: uuid
          nullable: true
        actorName:
          type: string
          nullable: true
          description: Display name of the actor
        actorRole:
          type: string
          nullable: true
        targetType:
          type: string
          nullable: true
        targetId:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
        ipAddress:
          type: string
          nullable: true
        correlationId:
          type: string
          format: uuid
          nullable: true
        clearedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

# Global security: all routes require JWT unless explicitly overridden with security: []
security:
  - bearerAuth: []

paths:

  # ─── AUTH ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with email and password. Returns access + refresh token pair.
      security: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
            Set-Cookie:
              description: Sets httpOnly refreshToken cookie (Secure in production, SameSite=Lax).
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Invalid credentials
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited (10 attempts per 15 min per IP)
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      description: Exchange a valid refresh token for a new access + refresh token pair (rotation).
      security: []
      parameters:
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token pair issued
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        '401':
          description: Invalid, expired, or already-used refresh token
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate refresh token)
      parameters:
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
        '401':
          description: Invalid token
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ─── USERS ───────────────────────────────────────────────────────────────────

  /users:
    get:
      tags: [Users]
      summary: List users
      description: "Roles: super_admin, admin"
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/Role'
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated user list
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  pagination:
                    $ref: '#/components/schemas/PaginationMeta'
        '403':
          description: Forbidden
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Users]
      summary: Create user
      description: "Roles: super_admin only"
      parameters:
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, fullName, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                fullName:
                  type: string
                role:
                  $ref: '#/components/schemas/Role'
                preferredLanguage:
                  type: string
                  enum: [en, hy, ru]
                  default: en
                clientGroupId:
                  type: string
                  format: uuid
                  nullable: true
                  description: Required when role = client.
      responses:
        '201':
          description: User created
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '409':
          description: Email already in use
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      description: "Roles: super_admin, admin (any user); all roles (own profile)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      responses:
        '200':
          description: User
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Users]
      summary: Update user
      description: |
        Roles: super_admin (any field on any user); all roles (fullName + preferredLanguage on own profile).
        Role and isActive fields are super_admin only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/CorrelationIdRequestHeader'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                preferredLanguage:
                  type: string
                  enum: [en, hy, ru]
                role:
                  $ref: '#/components/schemas/Role'
                  description: "super_admin only"
                isActive:
                  type: boolean
                  description: "super_admin only"
                clientGroupId:
                  type: string
                  format: uuid
                  nullable: true
                  description: "super_admin only; only for client role"
      responses:
        '200':
          description: Updated user
          headers:
            X-Correlation-ID:
              $ref: '#/components/headers/X-Correlation-ID'
          content:
            application/json:
              schema:
