version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: maxmarket_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maxmarket_user} -d ${POSTGRES_DB:-maxmarket_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NO ports exposed — only accessible from within Docker network

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: maxmarket_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-maxmarket_user}:${POSTGRES_PASSWORD:-maxmarket_password}@postgres:5432/${POSTGRES_DB:-maxmarket_db}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # NO ports exposed — only accessible via nginx

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: maxmarket_web
    restart: always
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  postgres_data:
